<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#7c3aed">
  <title>影视场景 Prompt 生成器</title>
  <style>
    :root {
      --bg: #0f0f1a; --surface: #1a1a2e; --card: #16213e;
      --text: #e2e8f0; --text-secondary: #94a3b8;
      --primary: #7c3aed; --primary-light: #a78bfa; --primary-dark: #6d28d9;
      --border: #2a2a4a; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro SC", "PingFang SC", "Segoe UI", sans-serif;
      font-size: 15px; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
    }
    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 480px; margin: 0 auto; }

    /* Header */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    header button {
      background: none; border: none; color: var(--text-secondary); font-size: 16px;
      cursor: pointer; padding: 4px 8px; border-radius: 8px;
    }
    header button:active { background: var(--border); }

    main { flex: 1; overflow-y: auto; padding: 16px; }

    /* Mode tabs */
    .mode-tabs { display:flex; gap:0; margin-bottom:12px; background:var(--surface); border-radius:10px; overflow:hidden; border:1px solid var(--border); }
    .mode-btn { flex:1; padding:10px; text-align:center; border:none; background:transparent; color:var(--text-secondary); font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; }
    .mode-btn.active { background:var(--primary); color:#fff; }
    .mode-section { display:none; }
    .mode-section.active { display:block; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    textarea, input, select {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px;
      font-size: 14px; outline: none; background: var(--surface); color: var(--text);
      font-family: inherit; transition: border-color 0.2s;
    }
    textarea:focus, input:focus, select:focus { border-color: var(--primary); }
    textarea { resize: vertical; min-height: 140px; line-height: 1.6; }

    .btn-primary {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: var(--primary); color: #fff; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-primary:active { opacity: 0.8; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      padding: 10px 20px; border: 1px solid var(--border); border-radius: 8px;
      background: transparent; color: var(--text-secondary); font-size: 14px; cursor: pointer;
    }
    .btn-secondary:active { background: var(--surface); }

    .btn-row { display: flex; gap: 8px; margin-top: 16px; }
    .btn-row .btn-primary, .btn-row .btn-secondary { width: auto; flex: 1; padding: 12px; font-size: 14px; }

    /* Steps */
    .step-indicator {
      display: flex; gap: 0; margin-bottom: 16px; background: var(--surface);
      border-radius: 10px; overflow: hidden; border: 1px solid var(--border);
    }
    .step {
      flex: 1; padding: 8px 4px; text-align: center; font-size: 11px; font-weight: 500;
      color: var(--text-secondary); transition: all 0.3s;
    }
    .step .num {
      display: inline-block; width: 20px; height: 20px; line-height: 20px; text-align: center;
      border-radius: 50%; background: var(--border); color: var(--text-secondary);
      font-size: 10px; font-weight: 700; margin-bottom: 2px;
    }
    .step.active .num { background: var(--primary); color: #fff; }
    .step.done .num { background: var(--success); color: #fff; }
    .step.done { color: var(--success); }
    .step.active { color: var(--text); }
    .step-content { display: none; }
    .step-content.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Style & Format short row */
    .inline-row { display: flex; gap: 8px; }
    .inline-row > * { flex: 1; }

    /* Loading */
    .loading { text-align: center; padding: 40px 20px; }
    .loading .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: var(--text-secondary); font-size: 14px; }

    /* Scene List Table */
    .scene-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 12px; }
    .scene-table th { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--border); color: var(--text-secondary); font-weight: 500; font-size: 11px; }
    .scene-table td { padding: 8px 6px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.4; }
    .scene-table .badge-state {
      display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; background: var(--card);
    }
    .scene-table .check-col { width: 36px; text-align: center; }

    .art-style-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 16px; margin-bottom: 16px; font-size: 13px; line-height: 1.8;
    }
    .art-style-box .label { color: var(--text-secondary); }

    /* Single Scene Generate */
    .scene-card {
      background: var(--card); border: 1px solid var(--primary); border-radius: var(--radius);
      padding: 16px; margin-bottom: 16px;
    }
    .scene-card .scene-title { font-size: 15px; font-weight: 600; color: var(--primary-light); margin-bottom: 8px; }
    .scene-card .scene-meta { font-size: 12px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 8px; }
    .scene-card .scene-meta span { display: inline-block; margin-right: 12px; }

    /* Prompt Result */
    .prompt-result {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px; margin: 12px 0; font-size: 13px; line-height: 1.8; white-space: pre-wrap;
      display: none;
    }
    .prompt-result.show { display: block; animation: fadeIn 0.3s; }

    .copy-btn {
      padding: 10px 24px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--primary); color: #fff; font-size: 14px; font-weight: 500; cursor: pointer;
      display: none; width: 100%;
    }
    .copy-btn.show { display: block; }
    .copy-btn:active { opacity: 0.8; }
    .copy-btn.copied { background: var(--success); border-color: var(--success); }

    /* Table buttons */
    .tbl-btn { background:none; border:none; cursor:pointer; font-size:14px; padding:2px 4px; border-radius:4px; color:var(--text-secondary); }
    .tbl-btn:active { background:var(--border); }
    .tbl-del:active { color:var(--danger); }
    .add-btn {
      width:100%; padding:10px; border:1px dashed var(--border); border-radius:10px;
      background:transparent; color:var(--text-secondary); font-size:13px; cursor:pointer; text-align:center; margin-bottom:12px;
    }
    .add-btn:active { background:var(--surface); }

    /* Editable prompt textarea */
    .prompt-input {
      width:100%; min-height:180px; padding:14px; border:1px solid var(--border); border-radius:10px;
      font-size:13px; line-height:1.8; outline:none; background:var(--surface); color:var(--text);
      font-family:inherit; resize:vertical;
    }
    .prompt-input:focus { border-color:var(--primary); }
    #promptResultWrap { display:none; margin:12px 0; }

    /* Progress */
    .progress-bar {
      height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 16px; overflow: hidden;
    }
    .progress-bar .fill {
      height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.3s;
    }

    /* Notes */
    .notes-box {
      background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3);
      border-radius: 8px; padding: 12px; font-size: 12px; color: var(--warning); line-height: 1.5; margin-top: 12px;
    }

    /* Modal */
    .modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      align-items: center; justify-content: center; z-index: 100;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: var(--surface); border-radius: 16px; padding: 24px;
      width: 88%; max-width: 360px;
    }
    .modal-content h2 { font-size: 18px; margin-bottom: 16px; text-align: center; }
    .modal-content .btn-modal {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      background: var(--primary); color: #fff; font-size: 15px; font-weight: 500; cursor: pointer;
    }

    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 8px;
      font-size: 13px; z-index: 200; display: none; white-space: nowrap;
    }
    .toast.show { display: block; animation: toastIn 0.3s; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>🎬 影视场景 Prompt 生成器</h1>
    <button id="settingsBtn">⚙️</button>
  </header>

  <main>
    <!-- Mode Switcher -->
    <div class="mode-tabs">
      <button class="mode-btn active" data-mode="extract">📋 场景提取</button>
      <button class="mode-btn" data-mode="refine">✨ 快速润色</button>
    </div>

    <!-- ===== Mode: Scene Extraction (steps) ===== -->
    <div class="mode-section active" id="modeExtract">
    <!-- Steps -->
    <div class="step-indicator" id="stepIndicator">
      <div class="step active" data-step="1"><div class="num">1</div>输入剧本</div>
      <div class="step" data-step="2"><div class="num">2</div>场景清单</div>
      <div class="step" data-step="3"><div class="num">3</div>生成 Prompt</div>
    </div>

    <!-- ===== Step 1: Input ===== -->
    <div class="step-content active" data-step="1">
      <div class="form-group">
        <label for="scriptInput">📄 粘贴剧本 / 剧情 / 故事梗概 / 分场大纲 / 场景描述</label>
        <textarea id="scriptInput" placeholder="把剧本内容粘贴到这里..."></textarea>
      </div>
      <button class="btn-primary" id="extractBtn">📋 提取场景清单</button>
    </div>

    <!-- ===== Step 2: Scene List ===== -->
    <div class="step-content" data-step="2">
      <div id="artStyleBox"></div>
      <div id="sceneTableWrap"></div>
      <div id="notesBox"></div>
      <div class="btn-row" id="step2Actions" style="display:none">
        <button class="btn-secondary" onclick="goStep(1)">← 返回修改</button>
        <button class="btn-primary" id="confirmBtn">✅ 确认，开始生成 Prompt</button>
      </div>
    </div>

    <!-- ===== Step 3: Generate One by One ===== -->
    <div class="step-content" data-step="3">
      <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
      <div id="phaseLabel" style="text-align:center;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:8px">🎬 场景 Prompt 生成阶段</div>
      <div id="currentSceneCard"></div>
      <button class="btn-primary" id="genPromptBtn">🎬 生成此场景 Prompt</button>
      <div id="promptResultWrap">
        <textarea class="prompt-input" id="promptResult" placeholder="Prompt 将在这里生成，你也可以直接编辑修改..."></textarea>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="copy-btn" id="copyPromptBtn">📋 复制 Prompt</button>
          <button class="btn-secondary" id="updatePromptBtn" style="flex:1;display:none" onclick="saveEditedPrompt()">💾 保存修改</button>
        </div>
      </div>
      <div class="btn-row" id="navBtns" style="display:none">
        <button class="btn-secondary" onclick="goStep(2)">← 场景清单</button>
        <button class="btn-primary" id="nextSceneBtn">下一个场景 →</button>
      </div>
    </div> <!-- /modeExtract -->

    <!-- ===== Mode: Quick Refine ===== -->
    <div class="mode-section" id="modeRefine">
      <div class="form-group">
        <label for="refineInput">✏️ 用你的话描述场景</label>
        <textarea id="refineInput" placeholder="随便写，越详细越好...&#10;&#10;例如：&#10;一个废弃的矿井入口，下着暴雨，周围漆黑一片，只有一盏矿灯照亮了生锈的铁栅栏，地上有积水。"></textarea>
      </div>
      <div class="inline-row" style="margin-bottom:12px">
        <div style="flex:1">
          <label for="refineStyle">🎨 风格（可选）</label>
          <input id="refineStyle" placeholder="如：赛博朋克、水墨风" value="电影级超写实">
        </div>
        <div style="flex:1">
          <label for="refineFormat">🎯 格式</label>
          <select id="refineFormat">
            <option value="midjourney">Midjourney</option>
            <option value="stable-diffusion">Stable Diffusion</option>
            <option value="dalle">DALL-E / 通义万相</option>
          </select>
        </div>
      </div>
      <button class="btn-primary" id="refineBtn">✨ 润色为电影级 Prompt</button>

      <div id="refineResultWrap" style="display:none;margin-top:16px">
        <label>📤 润色结果（可直接编辑）</label>
        <textarea class="prompt-input" id="refineResult" style="min-height:120px"></textarea>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn-primary" id="refineCopyBtn" style="flex:1">📋 复制</button>
          <button class="btn-secondary" id="refineSaveBtn" style="flex:1;display:none">💾 保存修改</button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Scene / Character Edit Modal -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <h2 id="editTitle">✏️ 编辑</h2>
    <input type="hidden" id="editIdx">
    <input type="hidden" id="editType" value="scene">

    <!-- Scene fields -->
    <div id="editSceneFields">
      <div class="form-group">
        <label>场景名称</label>
        <input id="editName" placeholder="如：暴雨夜的废弃矿井入口">
      </div>
      <div class="inline-row">
        <div class="form-group" style="flex:1">
          <label>时间</label>
          <input id="editTime" placeholder="如：夜晚">
        </div>
        <div class="form-group" style="flex:1">
          <label>地点</label>
          <input id="editLocation" placeholder="如：矿井入口">
        </div>
      </div>
      <div class="form-group">
        <label>场景状态</label>
        <input id="editState" placeholder="如：暴雨状态、废弃状态">
      </div>
      <div class="form-group">
        <label>核心视觉元素</label>
        <input id="editVisual" placeholder="如：生锈铁栅栏、矿灯、警示牌">
      </div>
      <div class="form-group">
        <label>真实性注意点</label>
        <input id="editReality" placeholder="如：注意危险空间阻隔">
      </div>
    </div>

    <!-- Character fields -->
    <div id="editCharFields" style="display:none">
      <div class="form-group">
        <label>角色名称</label>
        <input id="editCharName" placeholder="如：张队长">
      </div>
      <div class="inline-row">
        <div class="form-group" style="flex:1">
          <label>性别</label>
          <input id="editCharGender" placeholder="男/女">
        </div>
        <div class="form-group" style="flex:1">
          <label>年龄</label>
          <input id="editCharAge" placeholder="如：35岁、青年">
        </div>
      </div>
      <div class="form-group">
        <label>外貌特征</label>
        <input id="editCharAppearance" placeholder="如：身高180cm，短发，右脸疤痕">
      </div>
      <div class="form-group">
        <label>服装特征</label>
        <input id="editCharClothing" placeholder="如：黑色战术背心，军裤">
      </div>
      <div class="form-group">
        <label>关键特征</label>
        <input id="editCharFeatures" placeholder="如：眼神凶狠，气质硬朗">
      </div>
    </div>

    <div class="btn-row" style="margin-top:16px">
      <button class="btn-secondary" onclick="document.getElementById('editModal').classList.remove('open')" style="flex:1">取消</button>
      <button class="btn-primary" id="saveEditBtn" onclick="saveEdit()" style="flex:2">保存</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal" id="settingsModal">
  <div class="modal-content">
    <h2>⚙️ 设置</h2>
    <label for="apiKeyInput">DeepSeek API Key</label>
    <input type="password" id="apiKeyInput" placeholder="输入 DeepSeek API Key">
    <p style="font-size:12px;color:var(--text-secondary);margin:8px 0 16px;">在 platform.deepseek.com 获取</p>
    <button class="btn-modal" id="saveApiKey">保存</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== State =====
const S = {
  script: '',
  scenes: [],
  characters: [],
  artStyle: null,
  notes: '',
  currentIdx: 0,
  totalScenes: 0,
  generated: [],
  charCurrentIdx: 0,
  charTotal: 0,
  charGenerated: [],
  phase: 'scene', // 'scene' | 'character'
  format: 'midjourney'
};

// ===== Init =====
document.addEventListener('DOMContentLoaded', () => {
  const k = localStorage.getItem('deepseek_api_key');
  if (k) document.getElementById('apiKeyInput').value = k;
  document.getElementById('saveApiKey').onclick = () => {
    const v = document.getElementById('apiKeyInput').value.trim();
    if (v) { localStorage.setItem('deepseek_api_key', v); closeSettings(); toast('已保存'); }
  };
  document.getElementById('settingsBtn').onclick = openSettings;
  document.getElementById('settingsModal').onclick = (e) => { if (e.target === e.currentTarget) closeSettings(); };
  document.getElementById('editModal').onclick = (e) => { if (e.target === e.currentTarget) document.getElementById('editModal').classList.remove('open'); };
  document.getElementById('extractBtn').onclick = extractScenes;
  document.getElementById('confirmBtn').onclick = startGeneration;
  document.getElementById('genPromptBtn').onclick = () => {
    if (S.phase === 'character') {
      generateCharacterPrompt();
    } else {
      generateCurrentPrompt();
    }
  };
  document.getElementById('nextSceneBtn').onclick = nextScene;
  document.getElementById('copyPromptBtn').onclick = copyPrompt;

  // Mode switching
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b === btn));
      document.querySelectorAll('.mode-section').forEach(s => s.classList.toggle('active', s.id === 'mode' + btn.dataset.mode.charAt(0).toUpperCase() + btn.dataset.mode.slice(1)));
    };
  });

  // Quick refine
  document.getElementById('refineBtn').onclick = quickRefine;
  document.getElementById('refineCopyBtn').onclick = () => {
    const text = document.getElementById('refineResult').value;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => toast('已复制')).catch(() => toast('复制失败'));
  };
  document.getElementById('refineResult').oninput = function() {
    if (this.value !== this.defaultValue) {
      document.getElementById('refineSaveBtn').style.display = '';
    } else {
      document.getElementById('refineSaveBtn').style.display = 'none';
    }
  };
  document.getElementById('refineSaveBtn').onclick = () => {
    const v = document.getElementById('refineResult').value.trim();
    if (v) { toast('修改已保存'); document.getElementById('refineSaveBtn').style.display = 'none'; }
  };

  // Format selector (hidden in step 3)
  if (!localStorage.getItem('deepseek_api_key')) setTimeout(openSettings, 500);

  // Prompt edit detection - show save button when user modifies generated prompt
  document.getElementById('promptResult').oninput = function() {
    if (S.phase === 'character') {
      const idx = S.charCurrentIdx;
      if (S.charGenerated[idx] && this.value !== S.charGenerated[idx]) {
        document.getElementById('updatePromptBtn').style.display = '';
      } else {
        document.getElementById('updatePromptBtn').style.display = 'none';
      }
    } else {
      const idx = S.currentIdx;
      if (S.generated[idx] && this.value !== S.generated[idx]) {
        document.getElementById('updatePromptBtn').style.display = '';
      } else {
        document.getElementById('updatePromptBtn').style.display = 'none';
      }
    }
  };
});

// ===== Navigation =====
function goStep(n) {
  document.querySelectorAll('.step').forEach(el => {
    const s = parseInt(el.dataset.step);
    el.classList.toggle('active', s === n);
    el.classList.toggle('done', s < n);
  });
  document.querySelectorAll('.step-content').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.step) === n);
  });
  document.querySelector('main').scrollTop = 0;
}

// ===== Phase 1: Extract Scene List =====
const EXTRACT_PROMPT = `你是专业的影视剧本场景分析师、影视美术场景设计师、环境概念设计师、角色概念设计师。

## 任务
分析用户提供的剧本/剧情/故事梗概，分别提取出：
1. 需要制作的影视场景清单（纯场景，不包含人物）
2. 需要制作的角色概念设计清单（三视图+大头照）

## 核心原则
场景和人物严格分离——场景清单中只包含环境/空间/场景，人物角色单独提取到 characters 数组中。

## 场景识别规则
只有具备明确空间属性的内容才能识别为场景。
正确：建筑、房间、街道、森林、矿井、神殿、医院、地下空间、梦境空间
错误（不能单独作为场景）：暴雨、矿灯、铁栅栏、红光、尖叫、天空裂开

## 场景拆分规则
同一时间、同一地点、同一连续事件 = 同一个场景。
不要因为镜头变化、景别变化、人物移动、道具特写而拆分。
必须拆分的情况：地点变化、时间变化、室内外切换、现实/梦境切换、现实/回忆切换、场景状态明显变化。

## 场景状态规则
同一场景有明显变化时必须识别不同状态（如：基础状态、夜晚、暴雨、废弃、坍塌、火灾等）。
基础状态不能默认画成变化后状态。

## 场景 Prompt 人物处理规则
场景清单中不包含任何人物描写。场景 Prompt 中人物只能作为远景剪影、模糊人影、比例参考，不描写五官服装。

## 角色提取规则
从剧本中提取出有明确描述或需要出场的角色，每个角色一条。
包括：角色姓名/称呼、性别、年龄、外貌特征、服装特征、关键特征。

## 输出要求
以 JSON 格式返回（只返回 JSON，不要其他文字）：

{
  "artStyle": {
    "main": "电影级超写实影视美术风格",
    "era": "时代/地域判断",

    "color": "色彩基调",

  },

async function extractScenes() {
  const script = document.getElementById('scriptInput').value.trim();
  const apiKey = localStorage.getItem('deepseek_api_key');
  if (!apiKey) { toast('请先设置 API Key'); openSettings(); return; }
  if (!script) { toast('请粘贴剧本内容'); return; }

  S.script = script;
  const btn = document.getElementById('extractBtn');
  btn.disabled = true; btn.textContent = '提取中...';

  try {
    const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [{ role: 'system', content: EXTRACT_PROMPT }, { role: 'user', content: script }],
        temperature: 0.3, max_tokens: 4096
      })
    });
    if (!res.ok) throw new Error('API 错误 (' + res.status + ')');
    const data = await res.json();
    const reply = data.choices[0].message.content;

    let result;
    try { result = JSON.parse(reply); } catch {
      const m = reply.match(/```(?:json)?\s*([\s\S]*?)```/);
      result = m ? JSON.parse(m[1]) : null;
    }
    if (!result || !result.scenes) throw new Error('AI 返回格式异常');

    S.scenes = result.scenes.filter(s => s.generate !== false);
    S.characters = result.characters || [];
    S.artStyle = result.artStyle;
    S.notes = result.notes || '';
    S.totalScenes = S.scenes.length;
    S.generated = [];
    S.charTotal = S.characters.length;
    S.charGenerated = [];
    S.phase = 'scene';

    renderSceneList();
    goStep(2);
  } catch (err) {
    toast('提取失败：' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = '📋 提取场景清单';
  }
}

// ===== Scene / Character Edit Functions =====
function openSceneEdit(idx) {
  document.getElementById('editType').value = 'scene';
  document.getElementById('editTitle').textContent = '✏️ 编辑场景';
  document.getElementById('editSceneFields').style.display = '';
  document.getElementById('editCharFields').style.display = 'none';

  const isNew = idx === -1;
  const scene = isNew ? {} : S.scenes[idx];
  S._editIdx = idx;

  document.getElementById('editIdx').value = isNew ? '' : (S.scenes[idx].id || '');
  document.getElementById('editName').value = scene.name || '';
  document.getElementById('editTime').value = scene.time || '';
  document.getElementById('editLocation').value = scene.location || '';
  document.getElementById('editState').value = scene.state || '基础';
  document.getElementById('editVisual').value = scene.visual || '';
  document.getElementById('editReality').value = scene.realityNote || '';

  document.getElementById('editModal').classList.add('open');
}

function openCharacterEdit(idx) {
  document.getElementById('editType').value = 'character';
  document.getElementById('editTitle').textContent = '✏️ 编辑角色';
  document.getElementById('editSceneFields').style.display = 'none';
  document.getElementById('editCharFields').style.display = '';

  const isNew = idx === -1;
  const ch = isNew ? {} : S.characters[idx];
  S._editIdx = idx;

  document.getElementById('editIdx').value = isNew ? '' : (S.characters[idx].id || '');
  document.getElementById('editCharName').value = ch.name || '';
  document.getElementById('editCharGender').value = ch.gender || '';
  document.getElementById('editCharAge').value = ch.age || '';
  document.getElementById('editCharAppearance').value = ch.appearance || '';
  document.getElementById('editCharClothing').value = ch.clothing || '';
  document.getElementById('editCharFeatures').value = ch.features || '';

  document.getElementById('editModal').classList.add('open');
}

function saveEdit() {
  const type = document.getElementById('editType').value;
  const idx = S._editIdx;

  if (type === 'scene') {
    const data = {
      id: parseInt(document.getElementById('editIdx').value) || (S.scenes.length > 0 ? Math.max(...S.scenes.map(s => s.id)) + 1 : 1),
      name: document.getElementById('editName').value.trim(),
      time: document.getElementById('editTime').value.trim(),
      location: document.getElementById('editLocation').value.trim(),
      state: document.getElementById('editState').value.trim() || '基础',
      visual: document.getElementById('editVisual').value.trim(),
      realityNote: document.getElementById('editReality').value.trim(),
      generate: true
    };
    if (!data.name) { toast('请输入场景名称'); return; }
    if (idx === -1 || idx >= S.scenes.length) {
      S.scenes.push(data);
    } else {
      S.scenes[idx] = data;
    }
    S.totalScenes = S.scenes.length;
  } else {
    const data = {
      id: parseInt(document.getElementById('editIdx').value) || (S.characters.length > 0 ? Math.max(...S.characters.map(c => c.id)) + 1 : 1),
      name: document.getElementById('editCharName').value.trim(),
      gender: document.getElementById('editCharGender').value.trim(),
      age: document.getElementById('editCharAge').value.trim(),
      appearance: document.getElementById('editCharAppearance').value.trim(),
      clothing: document.getElementById('editCharClothing').value.trim(),
      features: document.getElementById('editCharFeatures').value.trim()
    };
    if (!data.name) { toast('请输入角色名称'); return; }
    if (idx === -1 || idx >= S.characters.length) {
      S.characters.push(data);
    } else {
      S.characters[idx] = data;
    }
    S.charTotal = S.characters.length;
  }

  document.getElementById('editModal').classList.remove('open');
  renderSceneList();
  toast('已保存');
}

function deleteScene(idx) {
  if (S.scenes.length <= 1) { toast('至少保留一个场景'); return; }
  S.scenes.splice(idx, 1);
  S.totalScenes = S.scenes.length;
  renderSceneList();
  toast('场景已删除');
}

function deleteCharacter(idx) {
  S.characters.splice(idx, 1);
  S.charTotal = S.characters.length;
  renderSceneList();
  toast('角色已删除');
}

// ===== Phase 2: Start Generation =====
function startGeneration() {
  S.currentIdx = 0;
  S.generated = [];
  S.charCurrentIdx = 0;
  S.charGenerated = [];
  S.phase = 'scene';
  goStep(3);
  if (S.totalScenes > 0) {
    showCurrentScene();
  } else if (S.charTotal > 0) {
    switchToCharacterPhase();
  }
}

function showCurrentScene() {
  if (S.phase === 'character') {
    showCurrentCharacter();
    return;
  }

  document.getElementById('phaseLabel').textContent = '🎬 场景 Prompt 生成阶段';

  const idx = S.currentIdx;
  const sc = S.scenes[idx];
  if (!sc) return;

  // Progress
  const pct = ((idx) / S.totalScenes) * 100;
  document.getElementById('progressFill').style.width = pct + '%';

  // Scene card with edit button
  document.getElementById('currentSceneCard').innerHTML =
    '<div class="scene-card">' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
    '<div class="scene-title">🎬 场次' + sc.id + '：' + esc(sc.name) + '</div>' +
    '<button class="tbl-btn" onclick="openSceneEdit(' + idx + ')" title="编辑场景信息">✏️</button>' +
    '</div>' +
    '<div class="scene-meta">' +
    '<span>⏰ ' + esc(sc.time || '-') + '</span>' +
    '<span>📍 ' + esc(sc.location || '-') + '</span>' +
    '<span>📌 ' + esc(sc.state || '基础') + '</span>' +
    '</div>' +
    '<div style="font-size:12px;color:var(--text-secondary)">' + esc(sc.visual || '') + '</div>' +
    '</div>' +
    '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;">场景 ' + (idx+1) + ' / ' + S.totalScenes + '</div>';

  // Reset result area
  resetPromptArea();

  // If already generated for this scene, show it
  if (S.generated[idx]) {
    document.getElementById('promptResult').value = S.generated[idx];
    document.getElementById('promptResultWrap').style.display = 'block';
    document.getElementById('copyPromptBtn').classList.add('show');
    document.getElementById('genPromptBtn').style.display = 'none';
    document.getElementById('navBtns').style.display = 'flex';
    document.getElementById('nextSceneBtn').textContent =
      idx < S.totalScenes - 1 ? '下一个场景 →' : (S.charTotal > 0 ? '→ 生成角色 Prompt' : '✅ 全部完成');
  }

  document.querySelector('main').scrollTop = 0;
}

function showCurrentCharacter() {
  document.getElementById('phaseLabel').textContent = '👤 角色概念设计 Prompt 生成阶段（三视图+大头照）';
  const idx = S.charCurrentIdx;
  const ch = S.characters[idx];
  if (!ch) return;

  // Progress (scenes full + character progress)
  const totalItems = S.totalScenes + S.charTotal;
  const doneItems = S.totalScenes + idx;
  const pct = (doneItems / totalItems) * 100;
  document.getElementById('progressFill').style.width = pct + '%';

  // Character card with edit button
  document.getElementById('currentSceneCard').innerHTML =
    '<div class="scene-card" style="border-color:var(--success)">' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
    '<div class="scene-title" style="color:var(--success)">👤 ' + esc(ch.name) + '</div>' +
    '<button class="tbl-btn" onclick="openCharacterEdit(' + idx + ')" title="编辑角色信息">✏️</button>' +
    '</div>' +
    '<div class="scene-meta">' +
    '<span>⚤ ' + esc(ch.gender || '-') + '</span>' +
    '<span>🎂 ' + esc(ch.age || '-') + '</span>' +
    '</div>' +
    '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px">' +
    '<span>外貌：' + esc(ch.appearance || '-') + '</span></div>' +
    '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px">' +
    '<span>服装：' + esc(ch.clothing || '-') + '</span></div>' +
    (ch.features ? '<div style="font-size:12px;color:var(--warning)">★ ' + esc(ch.features) + '</div>' : '') +
    '</div>' +
    '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;">角色 ' + (idx+1) + ' / ' + S.charTotal + '（三视图+大头照）</div>';

  // Reset result area
  resetPromptArea();
  document.getElementById('genPromptBtn').textContent = '👤 生成此角色 Prompt';

  // If already generated for this character, show it
  if (S.charGenerated[idx]) {
    document.getElementById('promptResult').value = S.charGenerated[idx];
    document.getElementById('promptResultWrap').style.display = 'block';
    document.getElementById('copyPromptBtn').classList.add('show');
    document.getElementById('genPromptBtn').style.display = 'none';
    document.getElementById('navBtns').style.display = 'flex';
    document.getElementById('nextSceneBtn').textContent =
      idx < S.charTotal - 1 ? '下一个角色 →' : '✅ 全部完成';
  }

  document.querySelector('main').scrollTop = 0;
}

function switchToCharacterPhase() {
  S.phase = 'character';
  S.charCurrentIdx = 0;
  showCurrentCharacter();
}

// ===== Generate One Prompt =====
const GEN_PROMPT_PREFIX = `你是专业的影视剧本场景分析师、影视美术场景设计师、环境概念设计师、AI 场景 Prompt 设计师。

## 核心原则
你的核心不是美化文字，而是先理解剧本中的真实物理世界，再生成真实可信、电影感强的场景 Prompt。

## 电影级场景 Prompt 核心规则
场景 Prompt 不是环境说明书，而是电影画面生成指令。
第一句话必须直接定义整张画面。

## 电影构图规则
可使用：压迫式构图、中轴构图、深焦空间、前景遮挡、单点光源、大面积黑暗、空间透视、引导线、空间压缩感。
不要只写简单的"前景、中景、远景"，要让画面有明确视觉中心和空间动线。

## 最终输出规则
只输出单段式中文 Prompt。不要输出标题、字段说明、分析过程、小标题、Prompt 解释、复杂结构、负面 Prompt。

最终 Prompt 必须：
1. 一段完成，可直接复制
2. 主视觉明确，场景主体明确
3. 时间、天气、光源、空间关系明确
4. 材质真实，有电影感
5. 不像是说明书或游戏地图
6. 不乱加剧本没有的灾变元素

## 最终 Prompt 推荐结构
按顺序：画幅与风格 → 核心画面定义 → 主视觉主体 → 时间与天气 → 光源位置与照亮范围 → 前景/中景/远景 → 空间结构 → 材质细节 → 环境叙事 → 色彩与情绪 → 电影质感关键词

推荐格式：
横屏16:9，电影级超写实影视场景，……，整体环境……，主视觉为……，唯一光源来自……，前景是……，中景是……，远景……，空间结构……，材质呈现……，环境中保留……，色彩基调……，氛围……，真实空间透视，真实光影逻辑，真实材质，8K，RAW电影质感，影视概念设定图品质

## 场景真实性校验规则（必须在内部自检）

### 时间逻辑
夜晚必须整体偏暗，只能由局部光源照亮局部区域。可用光源：月光、矿灯、手电、车灯、路灯、火光、闪电、警示灯。禁止无来源大面积均匀照明。

### 天气逻辑
天气必须影响场景。暴雨场景必须有：地面积水、水痕、泥泞、金属湿润反光、木材发黑、雨水流痕、雨雾、能见度降低。雨中灯具不能裸露在外。

### 危险空间逻辑
危险地点必须有现实阻隔：铁栅栏、封锁链、警示牌、围栏、生锈铁门、木板遮挡、禁止入内标识。

### 道具位置逻辑
道具必须放在符合现实的位置。灯应挂在墙面、门柱、铁架上，不能漂浮，不能随意放在雨中地面。

### 光源逻辑
每一个亮光都必须有来源并影响周围材质。禁止画面明亮但没有光源。

### 材质逻辑
废弃矿井：生锈铁栅栏、潮湿混凝土、黑色积水、泥泞地面、剥落警示牌。

12. 默认不输出负面 Prompt

## 当前整体美术风格`;

async function generateCurrentPrompt() {
  const idx = S.currentIdx;
  if (S.generated[idx]) {
    showGeneratedPrompt(idx);
    return;
  }

  const apiKey = localStorage.getItem('deepseek_api_key');
  if (!apiKey) { toast('请先设置 API Key'); openSettings(); return; }

  const sc = S.scenes[idx];
  const as = S.artStyle;
  const btn = document.getElementById('genPromptBtn');
  btn.disabled = true; btn.textContent = '生成中...';

  const sceneDetail = `## 场景信息
- 场次：${sc.id}
- 名称：${sc.name}
- 时间：${sc.time || '-'}
- 地点：${sc.location || '-'}
- 状态：${sc.state || '基础'}
- 核心视觉：${sc.visual || '-'}
- 真实性注意：${sc.realityNote || '无'}
${sc.previousPrompt ? '- 前一场空间关系参考：' + sc.previousPrompt.substring(0, 100) : ''}`;

  const styleInfo = as ? `\n- 主风格：${as.main || '电影级超写实'}\n- 时代/地域：${as.era || '-'}\n- 类型气质：${as.mood || '-'}\n- 色彩基调：${as.color || '-'}\n- 光影方向：${as.light || '-'}` : '';

  const userMsg = `请为以下场景生成电影级 AI 场景 Prompt。注意：必须严格还原剧情，不能脱离故事背景。

${sceneDetail}

整体美术风格：${styleInfo}

要求：
1. 核心视觉元素（visual）和真实性注意点（realityNote）必须融入 Prompt
2. 场景的气氛必须符合剧情语境，不能为了好看而添加剧本没有的元素
3. 这是一个独立的场景 Prompt，不依赖其他场景的信息
4. 材质必须真实到可见纹理级别，禁止塑料感和游戏感`;

  try {
    const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: GEN_PROMPT_PREFIX + styleInfo },
          { role: 'user', content: userMsg }
        ],
        temperature: 0.3, max_tokens: 2048
      })
    });
    if (!res.ok) throw new Error('API 错误 (' + res.status + ')');
    const data = await res.json();
    const prompt = data.choices[0].message.content.trim();

    S.generated[idx] = prompt;
    S.scenes[idx].previousPrompt = prompt;
    showGeneratedPrompt(idx);

    toast('Prompt 已生成！');
  } catch (err) {
    toast('生成失败：' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = '🎬 生成此场景 Prompt';
  }
}

  document.getElementById('updatePromptBtn').style.display = 'none';

  document.getElementById('copyPromptBtn').classList.remove('copied');

function resetGenBtnText() {
  const btn = document.getElementById('genPromptBtn');
  if (S.phase === 'character') {
    btn.textContent = '👤 生成此角色 Prompt';
  } else {
    btn.textContent = '🎬 生成此场景 Prompt';
  }
}

function saveEditedPrompt() {
  const val = document.getElementById('promptResult').value.trim();
  if (!val) return;
  if (S.phase === 'character') {
    S.charGenerated[S.charCurrentIdx] = val;
  } else {
    S.generated[S.currentIdx] = val;
  }
  toast('修改已保存');
  document.getElementById('updatePromptBtn').style.display = 'none';
}

function nextScene() {
  if (S.phase === 'character') {
    if (S.charCurrentIdx < S.charTotal - 1) {
      S.charCurrentIdx++;
      showCurrentCharacter();
      document.getElementById('genPromptBtn').textContent = '👤 生成此角色 Prompt';
      document.getElementById('genPromptBtn').style.display = '';
      document.getElementById('navBtns').style.display = 'none';
      document.getElementById('promptResult').classList.remove('show');
      document.getElementById('copyPromptBtn').classList.remove('show');
    } else {
      toast('🎉 全部角色 Prompt 已生成完成！');
    }
    return;
  }

  if (S.currentIdx < S.totalScenes - 1) {
    S.currentIdx++;
    showCurrentScene();
    document.getElementById('genPromptBtn').style.display = '';
    document.getElementById('navBtns').style.display = 'none';
    document.getElementById('promptResult').classList.remove('show');
    document.getElementById('copyPromptBtn').classList.remove('show');
  } else if (S.charTotal > 0) {
    // Transition to character phase
    switchToCharacterPhase();
    document.getElementById('genPromptBtn').style.display = '';
    document.getElementById('navBtns').style.display = 'none';
    document.getElementById('promptResult').classList.remove('show');
    document.getElementById('copyPromptBtn').classList.remove('show');
  } else {
    toast('🎉 全部场景 Prompt 已生成完成！');
  }
}

function copyPrompt() {
  const text = document.getElementById('promptResult').value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyPromptBtn');
    btn.textContent = '✅ 已复制';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 复制 Prompt';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
    toast('已复制');
  });
}

  document.getElementById('nextSceneBtn').textContent = isLast ? '✅ 全部完成' : '下一个角色 →';
}

// ===== Quick Refine =====
async function quickRefine() {
  const input = document.getElementById('refineInput').value.trim();
  const style = document.getElementById('refineStyle').value.trim() || '电影级超写实';
  const format = document.getElementById('refineFormat').value;
  const apiKey = localStorage.getItem('deepseek_api_key');
  if (!apiKey) { toast('请先设置 API Key'); openSettings(); return; }
  if (!input) { toast('请输入场景描述'); return; }

  const btn = document.getElementById('refineBtn');
  btn.disabled = true; btn.textContent = '润色中...';

  const formatGuide = {
    'midjourney': '适合 Midjourney 生成，简洁有力，重点词前置，用英文逗号分隔关键元素。',
    'stable-diffusion': '适合 Stable Diffusion 生成，包含完整场景描述，注重画幅和构图提示词。',
    'dalle': '适合 DALL-E / 通义万相 生成，自然语言完整段落描述。'
  };

  try {
    const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: REFINE_PROMPT + '\n\n## 用户选择的风格\n' + style + '\n\n## 输出格式适配\n' + (formatGuide[format] || '') },
          { role: 'user', content: input }
        ],
        temperature: 0.5, max_tokens: 2048
      })
    });
    if (!res.ok) throw new Error('API 错误 (' + res.status + ')');
    const data = await res.json();
    const result = data.choices[0].message.content.trim();

    document.getElementById('refineResult').value = result;
    document.getElementById('refineResult').defaultValue = result;
    document.getElementById('refineResultWrap').style.display = 'block';
    document.getElementById('refineSaveBtn').style.display = 'none';
    toast('润色完成！');
  } catch (err) {
    toast('润色失败：' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = '✨ 润色为电影级 Prompt';
  }
}

// ===== Helpers =====
function getAgeSkinGuide(age) {
  const a = String(age);
  if (a.includes('童') || a.includes('幼') || a.includes('小') || a.includes('婴儿') || parseInt(a) < 18) {
    return '年轻皮肤特点：皮肤紧致有弹性，毛孔细小，少量或没有皱纹，肤色均匀偏亮，天然饱满感。';
  } else if (a.includes('青') || a.includes('年') || (parseInt(a) >= 18 && parseInt(a) < 35)) {
    return '青年皮肤特点：皮肤有自然光泽感，毛孔可见但不粗大，轻微肤色不均，可能有少量痘印或雀斑，眼周有极细微纹，整体紧致有弹性。';
  } else if (a.includes('中') || a.includes('壮') || (parseInt(a) >= 35 && parseInt(a) < 55)) {
    return '中年皮肤特点：毛孔较明显，有自然细纹（眼角纹、法令纹、眉间纹），肤色可能出现不均和暗沉区域，皮肤质感真实粗粝，颧骨处有自然色素沉淀。';
  } else {
    return '老年皮肤特点：皮肤明显松弛，皱纹深且多（额头横纹、眼角鱼尾纹、法令纹、嘴角纹），毛孔粗大，老年斑或色素沉淀明显，皮肤光泽度降低，质感真实粗粝。';
  }
}
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function openSettings() { document.getElementById('settingsModal').classList.add('open'); }
function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
