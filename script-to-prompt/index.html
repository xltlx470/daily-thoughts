<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#7c3aed">
  <title>影视场景 Prompt 生成器</title>
  <style>
    :root {
      --bg: #0f0f1a; --surface: #1a1a2e; --card: #16213e;
      --text: #e2e8f0; --text-secondary: #94a3b8;
      --primary: #7c3aed; --primary-light: #a78bfa; --primary-dark: #6d28d9;
      --border: #2a2a4a; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro SC", "PingFang SC", "Segoe UI", sans-serif;
      font-size: 15px; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
    }
    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 480px; margin: 0 auto; }

    /* Header */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    header button {
      background: none; border: none; color: var(--text-secondary); font-size: 16px;
      cursor: pointer; padding: 4px 8px; border-radius: 8px;
    }
    header button:active { background: var(--border); }

    main { flex: 1; overflow-y: auto; padding: 16px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    textarea, input, select {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px;
      font-size: 14px; outline: none; background: var(--surface); color: var(--text);
      font-family: inherit; transition: border-color 0.2s;
    }
    textarea:focus, input:focus, select:focus { border-color: var(--primary); }
    textarea { resize: vertical; min-height: 140px; line-height: 1.6; }

    .btn-primary {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: var(--primary); color: #fff; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-primary:active { opacity: 0.8; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      padding: 10px 20px; border: 1px solid var(--border); border-radius: 8px;
      background: transparent; color: var(--text-secondary); font-size: 14px; cursor: pointer;
    }
    .btn-secondary:active { background: var(--surface); }

    .btn-row { display: flex; gap: 8px; margin-top: 16px; }
    .btn-row .btn-primary, .btn-row .btn-secondary { width: auto; flex: 1; padding: 12px; font-size: 14px; }

    /* Steps */
    .step-indicator {
      display: flex; gap: 0; margin-bottom: 16px; background: var(--surface);
      border-radius: 10px; overflow: hidden; border: 1px solid var(--border);
    }
    .step {
      flex: 1; padding: 8px 4px; text-align: center; font-size: 11px; font-weight: 500;
      color: var(--text-secondary); transition: all 0.3s;
    }
    .step .num {
      display: inline-block; width: 20px; height: 20px; line-height: 20px; text-align: center;
      border-radius: 50%; background: var(--border); color: var(--text-secondary);
      font-size: 10px; font-weight: 700; margin-bottom: 2px;
    }
    .step.active .num { background: var(--primary); color: #fff; }
    .step.done .num { background: var(--success); color: #fff; }
    .step.done { color: var(--success); }
    .step.active { color: var(--text); }
    .step-content { display: none; }
    .step-content.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Style & Format short row */
    .inline-row { display: flex; gap: 8px; }
    .inline-row > * { flex: 1; }

    /* Loading */
    .loading { text-align: center; padding: 40px 20px; }
    .loading .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: var(--text-secondary); font-size: 14px; }

    /* Scene List Table */
    .scene-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 12px; }
    .scene-table th { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--border); color: var(--text-secondary); font-weight: 500; font-size: 11px; }
    .scene-table td { padding: 8px 6px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.4; }
    .scene-table .badge-state {
      display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; background: var(--card);
    }
    .scene-table .check-col { width: 36px; text-align: center; }

    .art-style-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 16px; margin-bottom: 16px; font-size: 13px; line-height: 1.8;
    }
    .art-style-box .label { color: var(--text-secondary); }

    /* Single Scene Generate */
    .scene-card {
      background: var(--card); border: 1px solid var(--primary); border-radius: var(--radius);
      padding: 16px; margin-bottom: 16px;
    }
    .scene-card .scene-title { font-size: 15px; font-weight: 600; color: var(--primary-light); margin-bottom: 8px; }
    .scene-card .scene-meta { font-size: 12px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 8px; }
    .scene-card .scene-meta span { display: inline-block; margin-right: 12px; }

    /* Prompt Result */
    .prompt-result {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px; margin: 12px 0; font-size: 13px; line-height: 1.8; white-space: pre-wrap;
      display: none;
    }
    .prompt-result.show { display: block; animation: fadeIn 0.3s; }

    .copy-btn {
      padding: 10px 24px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--primary); color: #fff; font-size: 14px; font-weight: 500; cursor: pointer;
      display: none; width: 100%;
    }
    .copy-btn.show { display: block; }
    .copy-btn:active { opacity: 0.8; }
    .copy-btn.copied { background: var(--success); border-color: var(--success); }

    /* Progress */
    .progress-bar {
      height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 16px; overflow: hidden;
    }
    .progress-bar .fill {
      height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.3s;
    }

    /* Notes */
    .notes-box {
      background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3);
      border-radius: 8px; padding: 12px; font-size: 12px; color: var(--warning); line-height: 1.5; margin-top: 12px;
    }

    /* Modal */
    .modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      align-items: center; justify-content: center; z-index: 100;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: var(--surface); border-radius: 16px; padding: 24px;
      width: 88%; max-width: 360px;
    }
    .modal-content h2 { font-size: 18px; margin-bottom: 16px; text-align: center; }
    .modal-content .btn-modal {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      background: var(--primary); color: #fff; font-size: 15px; font-weight: 500; cursor: pointer;
    }

    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 8px;
      font-size: 13px; z-index: 200; display: none; white-space: nowrap;
    }
    .toast.show { display: block; animation: toastIn 0.3s; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>🎬 影视场景 Prompt 生成器</h1>
    <button id="settingsBtn">⚙️</button>
  </header>

  <main>
    <!-- Steps -->
    <div class="step-indicator" id="stepIndicator">
      <div class="step active" data-step="1"><div class="num">1</div>输入剧本</div>
      <div class="step" data-step="2"><div class="num">2</div>场景清单</div>
      <div class="step" data-step="3"><div class="num">3</div>生成 Prompt</div>
    </div>

    <!-- ===== Step 1: Input ===== -->
    <div class="step-content active" data-step="1">
      <div class="form-group">
        <label for="scriptInput">📄 粘贴剧本 / 剧情 / 故事梗概 / 分场大纲 / 场景描述</label>
        <textarea id="scriptInput" placeholder="把剧本内容粘贴到这里..."></textarea>
      </div>
      <button class="btn-primary" id="extractBtn">📋 提取场景清单</button>
    </div>

    <!-- ===== Step 2: Scene List ===== -->
    <div class="step-content" data-step="2">
      <div id="artStyleBox"></div>
      <div id="sceneTableWrap"></div>
      <div id="notesBox"></div>
      <div class="btn-row" id="step2Actions" style="display:none">
        <button class="btn-secondary" onclick="goStep(1)">← 返回修改</button>
        <button class="btn-primary" id="confirmBtn">✅ 确认，开始生成 Prompt</button>
      </div>
    </div>

    <!-- ===== Step 3: Generate One by One ===== -->
    <div class="step-content" data-step="3">
      <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
      <div id="currentSceneCard"></div>
      <button class="btn-primary" id="genPromptBtn">🎬 生成此场景 Prompt</button>
      <div class="prompt-result" id="promptResult"></div>
      <button class="copy-btn" id="copyPromptBtn">📋 复制 Prompt</button>
      <div class="btn-row" id="navBtns" style="display:none">
        <button class="btn-secondary" onclick="goStep(2)">← 场景清单</button>
        <button class="btn-primary" id="nextSceneBtn">下一个场景 →</button>
      </div>
    </div>
  </main>
</div>

<!-- Settings Modal -->
<div class="modal" id="settingsModal">
  <div class="modal-content">
    <h2>⚙️ 设置</h2>
    <label for="apiKeyInput">DeepSeek API Key</label>
    <input type="password" id="apiKeyInput" placeholder="输入 DeepSeek API Key">
    <p style="font-size:12px;color:var(--text-secondary);margin:8px 0 16px;">在 platform.deepseek.com 获取</p>
    <button class="btn-modal" id="saveApiKey">保存</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== State =====
const S = {
  script: '',
  scenes: [],
  artStyle: null,
  notes: '',
  currentIdx: 0,  // which scene we're generating
  totalScenes: 0,
  generated: [],
  format: 'midjourney'
};

// ===== Init =====
document.addEventListener('DOMContentLoaded', () => {
  const k = localStorage.getItem('deepseek_api_key');
  if (k) document.getElementById('apiKeyInput').value = k;
  document.getElementById('saveApiKey').onclick = () => {
    const v = document.getElementById('apiKeyInput').value.trim();
    if (v) { localStorage.setItem('deepseek_api_key', v); closeSettings(); toast('已保存'); }
  };
  document.getElementById('settingsBtn').onclick = openSettings;
  document.getElementById('settingsModal').onclick = (e) => { if (e.target === e.currentTarget) closeSettings(); };
  document.getElementById('extractBtn').onclick = extractScenes;
  document.getElementById('confirmBtn').onclick = startGeneration;
  document.getElementById('genPromptBtn').onclick = generateCurrentPrompt;
  document.getElementById('nextSceneBtn').onclick = nextScene;
  document.getElementById('copyPromptBtn').onclick = copyPrompt;

  // Format selector (hidden in step 3)
  if (!localStorage.getItem('deepseek_api_key')) setTimeout(openSettings, 500);
});

// ===== Navigation =====
function goStep(n) {
  document.querySelectorAll('.step').forEach(el => {
    const s = parseInt(el.dataset.step);
    el.classList.toggle('active', s === n);
    el.classList.toggle('done', s < n);
  });
  document.querySelectorAll('.step-content').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.step) === n);
  });
  document.querySelector('main').scrollTop = 0;
}

// ===== Phase 1: Extract Scene List =====
const EXTRACT_PROMPT = `你是专业的影视剧本场景分析师、影视美术场景设计师、环境概念设计师。

## 任务
分析用户提供的剧本/剧情/故事梗概，提取出真正需要制作的影视场景清单。

## 场景识别规则
只有具备明确空间属性的内容才能识别为场景。
正确：建筑、房间、街道、森林、矿井、神殿、医院、地下空间、梦境空间
错误（不能单独作为场景）：暴雨、矿灯、铁栅栏、红光、尖叫、天空裂开

## 场景拆分规则
同一时间、同一地点、同一连续事件 = 同一个场景。
不要因为镜头变化、景别变化、人物移动、道具特写而拆分。
必须拆分的情况：地点变化、时间变化、室内外切换、现实/梦境切换、现实/回忆切换、场景状态明显变化。

## 场景状态规则
同一场景有明显变化时必须识别不同状态（如：基础状态、夜晚、暴雨、废弃、坍塌、火灾等）。
基础状态不能默认画成变化后状态。

## 输出要求
以 JSON 格式返回（只返回 JSON，不要其他文字）：

{
  "artStyle": {
    "main": "电影级超写实影视美术风格",
    "era": "时代/地域判断",
    "mood": "类型气质",
    "color": "色彩基调",
    "light": "光影方向"
  },
  "scenes": [
    {
      "id": 1,
      "time": "时间",
      "location": "地点",
      "name": "场景名称",
      "state": "场景状态",
      "visual": "核心视觉元素概括",
      "realityNote": "真实性注意点",
      "generate": true
    }
  ],
  "notes": "备注"
}

注意：
- scenes 列出所有需要制作的场景，每个场景一条
- 同场景不同状态分两条列出但 id 连续
- generate 默认 true
- 描述用中文，简洁精准`;

async function extractScenes() {
  const script = document.getElementById('scriptInput').value.trim();
  const apiKey = localStorage.getItem('deepseek_api_key');
  if (!apiKey) { toast('请先设置 API Key'); openSettings(); return; }
  if (!script) { toast('请粘贴剧本内容'); return; }

  S.script = script;
  const btn = document.getElementById('extractBtn');
  btn.disabled = true; btn.textContent = '提取中...';

  try {
    const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [{ role: 'system', content: EXTRACT_PROMPT }, { role: 'user', content: script }],
        temperature: 0.3, max_tokens: 4096
      })
    });
    if (!res.ok) throw new Error('API 错误 (' + res.status + ')');
    const data = await res.json();
    const reply = data.choices[0].message.content;

    let result;
    try { result = JSON.parse(reply); } catch {
      const m = reply.match(/```(?:json)?\s*([\s\S]*?)```/);
      result = m ? JSON.parse(m[1]) : null;
    }
    if (!result || !result.scenes) throw new Error('AI 返回格式异常');

    S.scenes = result.scenes.filter(s => s.generate !== false);
    S.artStyle = result.artStyle;
    S.notes = result.notes || '';
    S.totalScenes = S.scenes.length;
    S.generated = [];

    renderSceneList();
    goStep(2);
  } catch (err) {
    toast('提取失败：' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = '📋 提取场景清单';
  }
}

function renderSceneList() {
  // Art style
  const as = S.artStyle;
  if (as) {
    document.getElementById('artStyleBox').innerHTML =
      '<div class="art-style-box">' +
      '<span class="label">主风格：</span>' + esc(as.main || '电影级超写实') + '<br>' +
      '<span class="label">时代/地域：</span>' + esc(as.era || '-') + '　　' +
      '<span class="label">类型气质：</span>' + esc(as.mood || '-') + '<br>' +
      '<span class="label">色彩基调：</span>' + esc(as.color || '-') + '　　' +
      '<span class="label">光影方向：</span>' + esc(as.light || '-') +
      '</div>';
  } else {
    document.getElementById('artStyleBox').innerHTML = '';
  }

  // Scene table
  const sc = S.scenes;
  let html = '<table class="scene-table"><thead><tr>' +
    '<th class="check-col">#</th><th>场景名称</th><th>时间</th><th>状态</th></tr></thead><tbody>';
  sc.forEach(s => {
    html += '<tr>' +
      '<td class="check-col">' + s.id + '</td>' +
      '<td><strong>' + esc(s.name) + '</strong><br><span style="font-size:11px;color:var(--text-secondary)">' + esc(s.location || '') + '</span></td>' +
      '<td>' + esc(s.time || '-') + '</td>' +
      '<td><span class="badge-state">' + esc(s.state || '基础') + '</span></td>' +
      '</tr>';
  });
  html += '</tbody></table>';

  // Extra detail for each scene
  html += '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;padding:0 4px;">';
  sc.forEach(s => {
    html += '<div style="margin-bottom:6px;"><strong>场次' + s.id + '：</strong>' + esc(s.visual || '') +
      (s.realityNote ? ' <span style="color:var(--warning)">⚠️ ' + esc(s.realityNote) + '</span>' : '') + '</div>';
  });
  html += '</div>';

  document.getElementById('sceneTableWrap').innerHTML = html;

  // Notes
  const nb = document.getElementById('notesBox');
  if (S.notes) {
    nb.innerHTML = '<div class="notes-box">📌 ' + esc(S.notes) + '</div>';
  } else {
    nb.innerHTML = '<div class="notes-box">暂无关键待确认项。</div>';
  }

  document.getElementById('step2Actions').style.display = 'flex';
}

// ===== Phase 2: Start Generation =====
function startGeneration() {
  S.currentIdx = 0;
  S.generated = [];
  goStep(3);
  showCurrentScene();
}

function showCurrentScene() {
  const idx = S.currentIdx;
  const sc = S.scenes[idx];
  if (!sc) return;

  // Progress
  const pct = ((idx) / S.totalScenes) * 100;
  document.getElementById('progressFill').style.width = pct + '%';

  // Scene card
  document.getElementById('currentSceneCard').innerHTML =
    '<div class="scene-card">' +
    '<div class="scene-title">🎬 场次' + sc.id + '：' + esc(sc.name) + '</div>' +
    '<div class="scene-meta">' +
    '<span>⏰ ' + esc(sc.time || '-') + '</span>' +
    '<span>📍 ' + esc(sc.location || '-') + '</span>' +
    '<span>📌 ' + esc(sc.state || '基础') + '</span>' +
    '</div>' +
    '<div style="font-size:12px;color:var(--text-secondary)">' + esc(sc.visual || '') + '</div>' +
    '</div>' +
    '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;">场景 ' + (idx+1) + ' / ' + S.totalScenes + '</div>';

  // Reset result area
  document.getElementById('promptResult').classList.remove('show');
  document.getElementById('promptResult').textContent = '';
  document.getElementById('copyPromptBtn').classList.remove('show');
  document.getElementById('copyPromptBtn').classList.remove('copied');
  document.getElementById('copyPromptBtn').textContent = '📋 复制 Prompt';
  document.getElementById('genPromptBtn').style.display = '';
  document.getElementById('navBtns').style.display = 'none';

  // If already generated for this scene, show it
  if (S.generated[idx]) {
    document.getElementById('promptResult').textContent = S.generated[idx];
    document.getElementById('promptResult').classList.add('show');
    document.getElementById('copyPromptBtn').classList.add('show');
    document.getElementById('genPromptBtn').style.display = 'none';
    document.getElementById('navBtns').style.display = 'flex';
    document.getElementById('nextSceneBtn').textContent =
      idx < S.totalScenes - 1 ? '下一个场景 →' : '✅ 全部完成';
  }

  document.querySelector('main').scrollTop = 0;
}

// ===== Generate One Prompt =====
const GEN_PROMPT_PREFIX = `你是专业的影视剧本场景分析师、影视美术场景设计师、环境概念设计师、AI 场景 Prompt 设计师。

## 核心原则
你的核心不是美化文字，而是先理解剧本中的真实物理世界，再生成真实可信、电影感强的场景 Prompt。

## 电影级场景 Prompt 核心规则
场景 Prompt 不是环境说明书，而是电影画面生成指令。
第一句话必须直接定义整张画面。

## 电影构图规则
可使用：压迫式构图、中轴构图、深焦空间、前景遮挡、单点光源、大面积黑暗、空间透视、引导线、空间压缩感。
不要只写简单的"前景、中景、远景"，要让画面有明确视觉中心和空间动线。

## 最终输出规则
只输出单段式中文 Prompt。不要输出标题、字段说明、分析过程、小标题、Prompt 解释、复杂结构、负面 Prompt。

最终 Prompt 必须：
1. 一段完成，可直接复制
2. 主视觉明确，场景主体明确

## 最终 Prompt 推荐结构
按顺序：画幅与风格 → 核心画面定义 → 主视觉主体 → 时间与天气 → 光源位置与照亮范围 → 前景/中景/远景 → 空间结构 → 材质细节 → 环境叙事 → 色彩与情绪 → 电影质感关键词

推荐格式：
横屏16:9，电影级超写实影视场景，……，整体环境……，主视觉为……，唯一光源来自……，前景是……，中景是……，远景……，空间结构……，材质呈现……，环境中保留……，色彩基调……，氛围……，真实空间透视，真实光影逻辑，真实材质，8K，RAW电影质感，影视概念设定图品质

## 场景真实性校验规则（必须在内部自检）

### 时间逻辑
夜晚必须整体偏暗，只能由局部光源照亮局部区域。可用光源：月光、矿灯、手电、车灯、路灯、火光、闪电、警示灯。禁止无来源大面积均匀照明。

### 天气逻辑
天气必须影响场景。暴雨场景必须有：地面积水、水痕、泥泞、金属湿润反光、木材发黑、雨水流痕、雨雾、能见度降低。雨中灯具不能裸露在外。

### 危险空间逻辑
危险地点必须有现实阻隔：铁栅栏、封锁链、警示牌、围栏、生锈铁门、木板遮挡、禁止入内标识。

### 道具位置逻辑
道具必须放在符合现实的位置。灯应挂在墙面、门柱、铁架上，不能漂浮，不能随意放在雨中地面。

### 光源逻辑
每一个亮光都必须有来源并影响周围材质。禁止画面明亮但没有光源。

### 材质逻辑
废弃矿井：生锈铁栅栏、潮湿混凝土、黑色积水、泥泞地面、剥落警示牌。
神殿：石柱、青苔、裂纹、灰尘、陈旧木梁、褪色壁画。
医院：剥落墙皮、旧瓷砖、冷白灯、走廊阴影、生锈病床。

## 人物处理
场景 Prompt 中人物只能作为远景剪影、模糊人影、比例参考。不能描写五官、服装细节。

## 最终执行原则
1. 先理解场景，再写 Prompt
2. 空间永远是主体
3. 夜晚必须黑
4. 光源必须有来源
5. 天气必须影响环境
6. 危险空间必须有阻隔
7. 道具位置必须合理
8. 基础状态不能变成变化后状态
9. 场景必须真实可信
10. Prompt 必须有电影画面感
11. 最终 Prompt 必须方便复制粘贴
12. 默认不输出负面 Prompt

async function generateCurrentPrompt() {
  const idx = S.currentIdx;
  if (S.generated[idx]) {
    // Already generated, show it
    document.getElementById('promptResult').textContent = S.generated[idx];
    document.getElementById('promptResult').classList.add('show');
    document.getElementById('copyPromptBtn').classList.add('show');
    document.getElementById('genPromptBtn').style.display = 'none';
    document.getElementById('navBtns').style.display = 'flex';
    return;
  }

  const apiKey = localStorage.getItem('deepseek_api_key');
  if (!apiKey) { toast('请先设置 API Key'); openSettings(); return; }

  const sc = S.scenes[idx];
  const as = S.artStyle;
  const btn = document.getElementById('genPromptBtn');
  btn.disabled = true; btn.textContent = '生成中...';

  const sceneDetail = `## 场景信息
- 场次：${sc.id}
- 名称：${sc.name}
- 时间：${sc.time || '-'}
- 地点：${sc.location || '-'}
- 状态：${sc.state || '基础'}
- 核心视觉：${sc.visual || '-'}
- 真实性注意：${sc.realityNote || '无'}
${sc.previousPrompt ? '- 前一场空间关系参考：' + sc.previousPrompt.substring(0, 100) : ''}`;

  const styleInfo = as ? `\n- 主风格：${as.main || '电影级超写实'}\n- 时代/地域：${as.era || '-'}\n- 类型气质：${as.mood || '-'}\n- 色彩基调：${as.color || '-'}\n- 光影方向：${as.light || '-'}` : '';

  const userMsg = `请为以下场景生成电影级 AI 场景 Prompt：

${sceneDetail}

整体美术风格：${styleInfo}

注意：这是一个独立的场景 Prompt，不要依赖其他场景的信息。但如果你认为场景之间存在空间连续性，可以在描述中适当体现。`;

  try {
    const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: GEN_PROMPT_PREFIX + styleInfo },
          { role: 'user', content: userMsg }
        ],
        temperature: 0.5, max_tokens: 2048
      })
    });
    if (!res.ok) throw new Error('API 错误 (' + res.status + ')');
    const data = await res.json();
    const prompt = data.choices[0].message.content.trim();

    S.generated[idx] = prompt;
    S.scenes[idx].previousPrompt = prompt;

    document.getElementById('promptResult').textContent = prompt;
    document.getElementById('promptResult').classList.add('show');
    document.getElementById('copyPromptBtn').classList.add('show');
    btn.style.display = 'none';
    document.getElementById('navBtns').style.display = 'flex';

    const isLast = idx >= S.totalScenes - 1;
    document.getElementById('nextSceneBtn').textContent = isLast ? '✅ 全部完成' : '下一个场景 →';

    toast('Prompt 已生成！');
  } catch (err) {
    toast('生成失败：' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = '🎬 生成此场景 Prompt';
  }
}

function nextScene() {
  if (S.currentIdx < S.totalScenes - 1) {
    S.currentIdx++;
    showCurrentScene();
    document.getElementById('genPromptBtn').style.display = '';
    document.getElementById('navBtns').style.display = 'none';
    document.getElementById('promptResult').classList.remove('show');
    document.getElementById('copyPromptBtn').classList.remove('show');
  } else {
    // All done
    toast('🎉 全部场景 Prompt 已生成完成！');
  }
}

function copyPrompt() {
  const text = document.getElementById('promptResult').textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyPromptBtn');
    btn.textContent = '✅ 已复制';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 复制 Prompt';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
    toast('已复制');
  });
}

// ===== Helpers =====
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function openSettings() { document.getElementById('settingsModal').classList.add('open'); }
function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
