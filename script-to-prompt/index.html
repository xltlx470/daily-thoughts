<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#7c3aed">
  <title>剧本提示词生成器</title>
  <style>
    :root {
      --bg: #0f0f1a; --surface: #1a1a2e; --card: #16213e;
      --text: #e2e8f0; --text-secondary: #94a3b8;
      --primary: #7c3aed; --primary-light: #a78bfa; --primary-dark: #6d28d9;
      --border: #2a2a4a; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro SC", "PingFang SC", "Segoe UI", sans-serif;
      font-size: 15px; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
    }
    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 480px; margin: 0 auto; }

    /* Header */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    header h1 { font-size: 17px; font-weight: 600; }
    header button {
      background: none; border: none; color: var(--text-secondary); font-size: 16px;
      cursor: pointer; padding: 4px 8px; border-radius: 8px;
    }
    header button:active { background: var(--border); }

    /* Main */
    main { flex: 1; overflow-y: auto; padding: 16px; }

    /* Steps */
    .step-indicator {
      display: flex; gap: 0; margin-bottom: 20px; background: var(--surface);
      border-radius: 10px; overflow: hidden; border: 1px solid var(--border);
    }
    .step {
      flex: 1; padding: 10px 6px; text-align: center; font-size: 12px; font-weight: 500;
      color: var(--text-secondary); position: relative; transition: all 0.3s;
    }
    .step .num {
      display: inline-block; width: 22px; height: 22px; line-height: 22px; text-align: center;
      border-radius: 50%; background: var(--border); color: var(--text-secondary);
      font-size: 11px; font-weight: 700; margin-bottom: 4px;
    }
    .step.active .num { background: var(--primary); color: #fff; }
    .step.done .num { background: var(--success); color: #fff; }
    .step.done { color: var(--success); }
    .step.active { color: var(--text); }

    .step-content { display: none; }
    .step-content.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Buttons */
    .btn-primary {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      background: var(--primary); color: #fff; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-primary:active { opacity: 0.8; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      padding: 10px 20px; border: 1px solid var(--border); border-radius: 8px;
      background: transparent; color: var(--text-secondary); font-size: 14px; cursor: pointer;
    }
    .btn-secondary:active { background: var(--surface); }

    .btn-row { display: flex; gap: 8px; margin-top: 16px; }
    .btn-row .btn-primary, .btn-row .btn-secondary { width: auto; flex: 1; padding: 12px; font-size: 14px; }

    /* Form */
    label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    textarea, input, select {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px;
      font-size: 14px; outline: none; background: var(--surface); color: var(--text);
      font-family: inherit; transition: border-color 0.2s;
    }
    textarea:focus, input:focus, select:focus { border-color: var(--primary); }
    textarea { resize: vertical; min-height: 140px; line-height: 1.6; }
    .form-group { margin-bottom: 16px; }

    /* Analysis Cards */
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px; margin-top: 20px;
    }
    .section-header:first-child { margin-top: 0; }
    .section-header h3 { font-size: 15px; font-weight: 600; }
    .section-header .badge {
      font-size: 12px; padding: 2px 10px; border-radius: 10px; background: var(--border); color: var(--text-secondary);
    }
    .section-header button {
      background: none; border: none; color: var(--primary-light); font-size: 13px; cursor: pointer;
      padding: 4px 8px; border-radius: 6px;
    }
    .section-header button:active { background: var(--border); }

    .item-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .item-card .info { flex: 1; min-width: 0; }
    .item-card .title { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .item-card .desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
    .item-card .actions { display: flex; gap: 4px; flex-shrink: 0; margin-left: 8px; }
    .item-card .actions button {
      background: none; border: none; font-size: 16px; cursor: pointer;
      padding: 4px 6px; border-radius: 6px; color: var(--text-secondary);
    }
    .item-card .actions button:active { background: var(--border); }
    .item-card .actions .del-btn:active { color: var(--danger); }

    .add-btn {
      width: 100%; padding: 10px; border: 1px dashed var(--border); border-radius: 10px;
      background: transparent; color: var(--text-secondary); font-size: 13px; cursor: pointer; text-align: center;
    }
    .add-btn:active { background: var(--surface); }

    /* Style selector */
    .style-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;
    }
    .style-option {
      padding: 12px; border: 1px solid var(--border); border-radius: 10px;
      text-align: center; background: var(--surface); cursor: pointer; transition: all 0.15s;
      font-size: 13px; color: var(--text-secondary);
    }
    .style-option:active { transform: scale(0.97); }
    .style-option.selected { border-color: var(--primary); background: rgba(124,58,237,0.15); color: var(--primary-light); }
    .style-option .emoji { font-size: 24px; display: block; margin-bottom: 4px; }

    /* Results */
    .prompt-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
    }
    .prompt-card .scene-title { font-size: 14px; font-weight: 600; color: var(--primary-light); margin-bottom: 6px; }
    .prompt-card .elements { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.5; }
    .prompt-card .prompt-text {
      font-size: 13px; line-height: 1.7; background: var(--surface);
      padding: 12px; border-radius: 8px; word-wrap: break-word; white-space: pre-wrap; margin-bottom: 10px;
    }
    .prompt-card .copy-btn {
      padding: 6px 16px; border: 1px solid var(--border); border-radius: 6px;
      background: transparent; color: var(--text-secondary); font-size: 12px; cursor: pointer;
    }
    .prompt-card .copy-btn:active { background: var(--primary); color: #fff; }
    .prompt-card .copy-btn.copied { background: var(--success); color: #fff; border-color: var(--success); }

    /* Loading */
    .loading { text-align: center; padding: 40px 20px; }
    .loading .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: var(--text-secondary); font-size: 14px; }

    /* Modal */
    .modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      align-items: center; justify-content: center; z-index: 100;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: var(--surface); border-radius: 16px; padding: 24px;
      width: 88%; max-width: 360px; max-height: 80vh; overflow-y: auto;
    }
    .modal-content h2 { font-size: 18px; margin-bottom: 16px; }
    .modal-content .btn-modal {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      background: var(--primary); color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px;
    }
    .modal-content .btn-modal-danger {
      background: var(--danger);
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 8px;
      font-size: 13px; z-index: 200; display: none; white-space: nowrap;
    }
    .toast.show { display: block; animation: toastIn 0.3s; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>🎬 剧本提示词生成器</h1>
    <button id="settingsBtn" title="设置">⚙️</button>
  </header>

  <main>
    <!-- Step Indicator -->
    <div class="step-indicator" id="stepIndicator">
      <div class="step active" data-step="1"><div class="num">1</div>输入剧本</div>
      <div class="step" data-step="2"><div class="num">2</div>审核分析</div>
      <div class="step" data-step="3"><div class="num">3</div>风格+生成</div>
      <div class="step" data-step="4"><div class="num">4</div>结果</div>
    </div>

    <!-- ===== Step 1: Input Script ===== -->
    <div class="step-content active" data-step="1">
      <div class="form-group">
        <label for="scriptInput">📄 粘贴剧本</label>
        <textarea id="scriptInput" placeholder="把剧本内容粘贴到这里...&#10;&#10;示例：&#10;场景：深夜办公室&#10;李明盯着电脑屏幕，揉了揉眼睛。&#10;王芳推门进来："还在加班？"&#10;李明叹了口气："这个方案明天要交。""></textarea>
      </div>
      <button class="btn-primary" id="analyzeBtn">🔍 分析剧本</button>
    </div>

    <!-- ===== Step 2: Review Analysis ===== -->
    <div class="step-content" data-step="2">
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;">AI 分析了剧本内容，请审核以下信息。你可以编辑、添加或删除项目。</p>

      <!-- Scenes -->
      <div class="section-header">
        <h3>🎬 场景</h3>
        <span class="badge" id="sceneCount">0</span>
      </div>
      <div id="sceneList"></div>
      <button class="add-btn" onclick="editItem('scene', null)">+ 添加场景</button>

      <!-- Characters -->
      <div class="section-header">
        <h3>👤 人物</h3>
        <span class="badge" id="charCount">0</span>
      </div>
      <div id="charList"></div>
      <button class="add-btn" onclick="editItem('character', null)">+ 添加人物</button>

      <!-- Props -->
      <div class="section-header">
        <h3>📦 道具 / 环境要素</h3>
        <span class="badge" id="propCount">0</span>
      </div>
      <div id="propList"></div>
      <button class="add-btn" onclick="editItem('prop', null)">+ 添加道具</button>

      <div class="btn-row">
        <button class="btn-secondary" onclick="goStep(1)">← 返回修改</button>
        <button class="btn-primary" onclick="goStep(3)">确认，下一步 →</button>
      </div>
    </div>

    <!-- ===== Step 3: Style + Generate ===== -->
    <div class="step-content" data-step="3">
      <div class="form-group">
        <label>🎨 选择风格</label>
        <div class="style-grid" id="styleGrid"></div>
        <input id="customStyle" placeholder="或自定义风格..." style="margin-top:8px;">
      </div>
      <div class="form-group">
        <label for="formatSelect">🎯 输出格式</label>
        <select id="formatSelect">
          <option value="midjourney">Midjourney（英文提示词 + 中文摄影描述）</option>
          <option value="stable-diffusion">Stable Diffusion（中文提示词）</option>
          <option value="dalle">DALL-E 3 / 通义万相（中文描述）</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="goStep(2)">← 审核修改</button>
        <button class="btn-primary" id="generateBtn">🚀 生成提示词</button>
      </div>
    </div>

    <!-- ===== Step 4: Results ===== -->
    <div class="step-content" data-step="4">
      <div id="resultsContainer"></div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="goStep(3)">← 换风格重试</button>
        <button class="btn-secondary" onclick="goStep(2)">✏️ 修改分析</button>
      </div>
    </div>
  </main>
</div>

<!-- Edit Modal -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <h2 id="editModalTitle">编辑</h2>
    <div class="form-group">
      <label id="editLabel1">名称</label>
      <input id="editInput1" placeholder="名称">
    </div>
    <div class="form-group" id="editField2Group">
      <label id="editLabel2">描述</label>
      <input id="editInput2" placeholder="描述">
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeEditModal()" style="flex:1">取消</button>
      <button class="btn-primary" id="editSaveBtn" style="flex:2">保存</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal" id="settingsModal">
  <div class="modal-content">
    <h2>⚙️ 设置</h2>
    <label for="apiKeyInput">DeepSeek API Key</label>
    <input type="password" id="apiKeyInput" placeholder="输入 DeepSeek API Key">
    <p class="hint" style="font-size:12px;color:var(--text-secondary);margin:8px 0 16px;">在 platform.deepseek.com 获取</p>
    <button class="btn-modal" id="saveApiKey">保存</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== App State =====
const state = {
  analysis: { scenes: [], characters: [], props: [] },
  currentStep: 1,
  results: []
};

// Style presets
const STYLES = [
  { emoji: '🎬', name: '写实电影' },
  { emoji: '🌃', name: '赛博朋克' },
  { emoji: '🖌️', name: '水墨国风' },
  { emoji: '🏔️', name: '宫崎骏' },
  { emoji: '🦇', name: '暗黑哥特' },
  { emoji: '🎈', name: '皮克斯动画' },
  { emoji: '🌊', name: '浮世绘' },
  { emoji: '🌴', name: '蒸汽波' },
];

// ===== Init =====
document.addEventListener('DOMContentLoaded', () => {
  // API key
  const saved = localStorage.getItem('deepseek_api_key');
  if (saved) document.getElementById('apiKeyInput').value = saved;
  document.getElementById('saveApiKey').onclick = () => {
    const k = document.getElementById('apiKeyInput').value.trim();
    if (k) { localStorage.setItem('deepseek_api_key', k); closeSettings(); toast('已保存'); }
  };
  document.getElementById('settingsBtn').onclick = () => openSettings();
  document.getElementById('settingsModal').onclick = (e) => { if (e.target === e.currentTarget) closeSettings(); };

  // Init style grid
  const grid = document.getElementById('styleGrid');
  STYLES.forEach(s => {
    const div = document.createElement('div');
    div.className = 'style-option';
    div.innerHTML = `<span class="emoji">${s.emoji}</span>${s.name}`;
    div.dataset.style = s.name;
    div.onclick = () => {
      grid.querySelectorAll('.style-option').forEach(el => el.classList.remove('selected'));
      div.classList.add('selected');
      document.getElementById('customStyle').value = s.name;
    };
    grid.appendChild(div);
  });
  // Default select first
  grid.querySelector('.style-option')?.classList.add('selected');

  // Analyze
  document.getElementById('analyzeBtn').onclick = () => analyzeScript();

  // Generate
  document.getElementById('generateBtn').onclick = () => generate();

  // Auto-open settings
  if (!localStorage.getItem('deepseek_api_key')) setTimeout(openSettings, 500);
});

// ===== Step Navigation =====
function goStep(n) {
  state.currentStep = n;
  document.querySelectorAll('.step').forEach(el => {
    const s = parseInt(el.dataset.step);
    el.classList.toggle('active', s === n);
    el.classList.toggle('done', s < n);
  });
  document.querySelectorAll('.step-content').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.step) === n);
  });
  if (n === 2) renderAnalysis();
  if (n === 4) {} // Results already rendered
  document.querySelector('main').scrollTop = 0;
}

// ===== Step 1: Analyze Script =====
async function analyzeScript() {
  const script = document.getElementById('scriptInput').value.trim();
  const apiKey = localStorage.getItem('deepseek_api_key');
  if (!apiKey) { toast('请先设置 API Key'); openSettings(); return; }
  if (!script) { toast('请粘贴剧本内容'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true; btn.textContent = '分析中...';

  const systemPrompt = `你是一个专业的剧本分析助手。分析用户提供的剧本/脚本，提取出结构化信息。

请按以下 JSON 格式返回（只返回 JSON，不要其他文字）：
{
  "scenes": [
    { "name": "场景名称", "desc": "环境描述、光线条件、氛围、时间" }
  ],
  "characters": [
    { "name": "人物名称", "desc": "人物外貌/服装/表情/动作状态" }
  ],
  "props": [
    { "name": "道具/要素名称", "desc": "说明（材质、颜色、功能）" }
  ]
}

注意：
- scenes 至少提取 1 个场景，描述要包含光线、氛围、色彩基调
- characters 从剧本中分析所有出现的人物，描述外貌和状态
- props 提取重要的道具、环境元素
- 描述用中文，尽量详细，为后续生成绘图提示词提供足够信息`;

  try {
    const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: script }],
        temperature: 0.4,
        max_tokens: 4096
      })
    });
    if (!res.ok) throw new Error(`API 错误 (${res.status})`);

    const data = await res.json();
    const reply = data.choices[0].message.content;

    // Parse JSON
    let parsed;
    try {
      parsed = JSON.parse(reply);
    } catch {
      // Try to extract JSON from markdown
      const m = reply.match(/```(?:json)?\s*([\s\S]*?)```/);
      if (m) parsed = JSON.parse(m[1]);
      else throw new Error('AI 返回格式异常，请重试');
    }

    state.analysis = {
      scenes: parsed.scenes || [],
      characters: parsed.characters || [],
      props: parsed.props || []
    };

    goStep(2);
  } catch (err) {
    toast('分析失败：' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = '🔍 分析剧本';
  }
}

// ===== Step 2: Render & Edit Analysis =====
function renderAnalysis() {
  const a = state.analysis;

  // Scenes
  document.getElementById('sceneCount').textContent = a.scenes.length;
  const sl = document.getElementById('sceneList');
  sl.innerHTML = a.scenes.map((s, i) => cardHTML(s, 'scene', i)).join('');

  // Characters
  document.getElementById('charCount').textContent = a.characters.length;
  const cl = document.getElementById('charList');
  cl.innerHTML = a.characters.map((c, i) => cardHTML(c, 'character', i)).join('');

  // Props
  document.getElementById('propCount').textContent = a.props.length;
  const pl = document.getElementById('propList');
  pl.innerHTML = a.props.map((p, i) => cardHTML(p, 'prop', i)).join('');
}

function cardHTML(item, type, idx) {
  return `<div class="item-card">
    <div class="info">
      <div class="title">${escapeHtml(item.name)}</div>
      ${item.desc ? `<div class="desc">${escapeHtml(item.desc)}</div>` : ''}
    </div>
    <div class="actions">
      <button onclick="editItem('${type}', ${idx})">✏️</button>
      <button class="del-btn" onclick="deleteItem('${type}', ${idx})">🗑️</button>
    </div>
  </div>`;
}

function deleteItem(type, idx) {
  state.analysis[type + 's'].splice(idx, 1);
  renderAnalysis();
}

// Edit modal
let editContext = { type: null, idx: null };

function editItem(type, idx) {
  editContext = { type, idx };
  const list = type + 's';
  const item = idx !== null ? state.analysis[list][idx] : { name: '', desc: '' };

  const isProp = type === 'prop';
  document.getElementById('editModalTitle').textContent = idx !== null ? `编辑${isProp ? '道具' : type === 'scene' ? '场景' : '人物'}` : `添加${isProp ? '道具' : type === 'scene' ? '场景' : '人物'}`;
  document.getElementById('editLabel1').textContent = isProp ? '道具名称' : type === 'scene' ? '场景名称' : '人物名称';
  document.getElementById('editInput1').value = item.name || '';
  document.getElementById('editField2Group').style.display = isProp ? 'none' : '';
  document.getElementById('editLabel2').textContent = type === 'scene' ? '场景描述' : '人物描述';
  document.getElementById('editInput2').value = item.desc || '';

  document.getElementById('editSaveBtn').onclick = () => {
    const name = document.getElementById('editInput1').value.trim();
    const desc = isProp ? '' : document.getElementById('editInput2').value.trim();
    if (!name) { toast('请填写名称'); return; }

    if (idx !== null) {
      state.analysis[list][idx] = { name, desc };
    } else {
      state.analysis[list].push({ name, desc });
    }
    closeEditModal();
    renderAnalysis();
  };

  document.getElementById('editModal').classList.add('open');
}

function closeEditModal() { document.getElementById('editModal').classList.remove('open'); }
document.getElementById('editModal').onclick = (e) => { if (e.target === e.currentTarget) closeEditModal(); };

// ===== Step 3: Generate =====
async function generate() {
  const apiKey = localStorage.getItem('deepseek_api_key');
  if (!apiKey) { toast('请先设置 API Key'); openSettings(); return; }

  const style = document.getElementById('customStyle').value.trim();
  if (!style) { toast('请选择或输入风格'); return; }
  const format = document.getElementById('formatSelect').value;

  goStep(4);
  const container = document.getElementById('resultsContainer');
  container.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在生成提示词...</p></div>';

  const analysis = state.analysis;
  const scenesJSON = JSON.stringify(analysis.scenes, null, 2);
  const charsJSON = JSON.stringify(analysis.characters, null, 2);
  const propsJSON = JSON.stringify(analysis.props, null, 2);

  const formatGuide = {
    'midjourney': `- 使用中文描述
- 包含构图、光线、镜头等摄影专业知识
- 末尾加参数如 --ar 16:9 --v 6
- 场景示例：深夜办公室，空无一人，电脑屏幕亮着，暖色台灯，窗外城市夜景，伦勃朗布光，85mm定焦，浅景深，青橙色调，电影感 --ar 16:9 --v 6
- 人物设计图示例：年轻男性角色设计稿，左中右依次为正面/侧面/背面全身三视图，右下角嵌入面部大头照特写，浅灰背景，统一光照，角色概念设计风格 --ar 16:9 --v 6`,
    'stable-diffusion': `- 使用中文描述
- 包含专业摄影知识
- 正面提示词 ### 负面提示词`,
    'dalle': `- 使用中文自然语言详细描述
- 包含构图、光线、镜头、色彩等摄影专业知识`
  }[format];

  const systemPrompt = `你是一名专业的影视剧本场景分析师、影视美术场景设计师、环境概念设计师、AI 场景 Prompt 设计师。你的专长是从剧本出发，为每个场景设计具有 cinematic 美感的概念设计图和场景 Prompt。

## 你的核心能力

- **影视剧本场景分析**：精准提取剧本中的场景要素、时间、空间、氛围
- **影视美术场景设计**：从美术设计角度构思场景的色彩基调、材质、陈设、空间布局
- **环境概念设计**：为场景建立环境叙事，让环境本身讲述故事
- **AI 场景 Prompt 工程**：将专业影视美术知识转化为高精度的 AI 绘图提示词

## 你掌握的摄影专业知识（必须融入每个提示词）

### 1. 构图技巧
- 三分法则、黄金螺旋、引导线构图、框架构图、对称构图、负空间
- 拍摄角度：俯拍、仰拍、平视、过肩镜头、鸟瞰视角、低角度
- 景别：特写、中景、全景、远景、大特写

### 2. 光线运用
- 布光方式：伦勃朗光、蝴蝶光、侧光、逆光、轮廓光、软光、硬光
- 光源类型：自然光、窗口光、霓虹灯、烛光、混合色温
- 光影效果：丁达尔效应、光晕、漏光、剪影、反射光

### 3. 镜头与相机
- 镜头焦段：24mm广角、35mm人文、50mm标准、85mm人像、135mm长焦、微距
- 光圈效果：大光圈浅景深、小光圈全景深、星芒效果
- 特殊镜头：移轴、鱼眼、变形宽银幕

### 4. 色彩与影调
- 色调：青橙调、低饱和、高对比、胶片感、莫兰迪色、赛博朋克霓虹
- 色彩心理：冷色调(孤独/科技)、暖色调(温馨/怀旧)、单色
- 胶片模拟：Kodak Portra 400、富士Classic Chrome、黑白Tri-X

### 5. 氛围与质感
- 空气透视、雾霾、雨水、灰尘颗粒、烟雾
- 景深层次：前景、中景、背景
- 时间感：黄金时刻、蓝调时刻、午夜

## 剧本分析结果

### 场景
${scenesJSON}

### 人物
${charsJSON}

### 道具/环境要素
${propsJSON}

## 你的任务

你需要生成两类提示词：

### 第一类：场景提示词（每个场景一个）
- 只描述环境、空间、光线、氛围
- **禁止出现人物**
- 突出场景的空间感和氛围感
- 包含完整的摄影专业知识

### 第二类：人物提示词（每个人物一个提示词）
- 在一张图中同时展示该人物的**三视图（正面+侧面+背面）+ 大头照面部特写**
- 布局类似角色设计稿：左中右分别是正面/侧面/背面全身，右下角或上方插入面部大头照特写
- 纯色/渐变背景（白色或浅灰色）
- 人物居中，清晰展示服装和体型
- 角色设计图/概念设计风格
- 大头照部分突出五官细节和专业人像布光
- 整张图统一光照和色调

### 第三类：道具提示词（每个重要道具一个提示词）
- 纯色背景下的道具单体展示
- 商业摄影布光，清晰展示材质细节

## 输出要求
以 JSON 格式返回（只返回 JSON，不要其他文字）：
{
  "scenes": [
    {
      "scene": "场景名称",
      "elements": "关键环境要素概括（中文）",
      "prompt": "场景绘图提示词（中文，不含人物，包含摄影专业知识，100字左右）"
    }
  ],
  "characters": [
    {
      "name": "人物名称",
      "desc": "人物特征描述",
      "prompt": "人物设计图提示词（中文，在一张图中包含三视图+大头照，角色设计稿风格）"
    }
  ]
}

场景数量与上面提供的场景数量一致，人物数量与上面提供的人物数量一致。`;

  try {
    const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: `请根据上面的剧本分析结果，按「${style}」风格生成提示词。注意：场景提示词中不能出现人物，人物单独生成三视图和大头照。务必融入专业摄影知识。` }],
        temperature: 0.6,
        max_tokens: 4096
      })
    });
    if (!res.ok) throw new Error(`API 错误 (${res.status})`);

    const data = await res.json();
    const reply = data.choices[0].message.content;

    let result;
    try {
      result = JSON.parse(reply);
    } catch {
      const m = reply.match(/```(?:json)?\s*([\s\S]*?)```/);
      result = m ? JSON.parse(m[1]) : { scenes: [{ scene: '完整提示词', elements: '', prompt: reply }], characters: [] };
    }

    state.results = result;
    renderResults(result);
  } catch (err) {
    container.innerHTML = `<div style="text-align:center;padding:40px;color:#ef4444">生成失败：${err.message}</div>`;
  }
}

function renderResults(result) {
  const container = document.getElementById('resultsContainer');
  const scenes = result.scenes || [];
  const characters = result.characters || [];
  const total = scenes.length + characters.length;
  container.innerHTML = `<div style="margin-bottom:12px;font-size:14px;color:var(--text-secondary)">共 ${scenes.length} 个场景 + ${characters.length} 个人物</div>`;

  // ---- Scenes Section ----
  if (scenes.length > 0) {
    const section = document.createElement('div');
    section.style.marginBottom = '24px';
    section.innerHTML = `<h3 style="font-size:16px;margin-bottom:12px;">🎬 场景提示词</h3>`;
    scenes.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'prompt-card';
      card.innerHTML = `
        <div class="scene-title">🎬 ${escapeHtml(p.scene || '场景 ' + (i+1))}</div>
        ${p.elements ? `<div class="elements">📌 ${escapeHtml(p.elements)}</div>` : ''}
        <div class="prompt-text">${escapeHtml(p.prompt)}</div>
        <button class="copy-btn" data-text="${escapeHtml(p.prompt)}">📋 复制</button>
      `;
      section.appendChild(card);
    });
    container.appendChild(section);
  }

  // ---- Characters Section ----
  if (characters.length > 0) {
    const section = document.createElement('div');
    section.innerHTML = `<h3 style="font-size:16px;margin-bottom:12px;">👤 人物提示词</h3>`;
    characters.forEach((ch, i) => {
      const card = document.createElement('div');
      card.className = 'prompt-card';
      let html = `<div class="scene-title">👤 ${escapeHtml(ch.name || '人物 ' + (i+1))}</div>`;
      if (ch.desc) html += `<div class="elements">📌 ${escapeHtml(ch.desc)}</div>`;
      if (ch.prompt) {
        html += `<div style="font-size:12px;color:var(--primary-light);margin:8px 0 4px;">🎨 三视图 + 大头照（一张图）</div>`;
        html += `<div class="prompt-text">${escapeHtml(ch.prompt)}</div>`;
        html += `<button class="copy-btn" data-text="${escapeHtml(ch.prompt)}">📋 复制</button>`;
      }
      card.innerHTML = html;
      section.appendChild(card);
    });
    container.appendChild(section);
  }

  // Copy buttons
  container.querySelectorAll('.copy-btn').forEach(btn => {
    btn.onclick = async () => {
      try {
        await navigator.clipboard.writeText(btn.dataset.text);
        btn.textContent = '✅ 已复制'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '📋 复制'; btn.classList.remove('copied'); }, 2000);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = btn.dataset.text; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); ta.remove();
        toast('已复制');
      }
    };
  });
}

// ===== Helpers =====
function escapeHtml(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function openSettings() { document.getElementById('settingsModal').classList.add('open'); }
function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
